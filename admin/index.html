<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Painel Admin | Impulso Digital</title>
  <link rel="stylesheet" href="../assets/style.css" />
</head>
<body class="admin-body">
  <div id="loginView" class="login-page">
    <form id="loginForm" class="login-card">
      <h1>⚡ Painel Admin</h1>
      <p class="notice">Entre com o e-mail e senha criados em Authentication no Supabase.</p>
      <div class="field"><label>E-mail</label><input id="email" type="email" required placeholder="admin@email.com"></div>
      <div class="field"><label>Senha</label><input id="password" type="password" required placeholder="Sua senha"></div>
      <button class="save-btn" type="submit">Entrar</button>
      <p id="loginMsg"></p>
    </form>
  </div>

  <div id="adminView" class="admin-wrap hidden">
    <header class="admin-header">
      <div><a class="brand" href="../"><span>⚡</span> Impulso Digital</a><p>Cadastro, edição e remoção de produtos Hotmart.</p></div>
      <button id="logoutBtn" class="ghost">Sair</button>
    </header>

    <div class="admin-grid">
      <section class="panel">
        <h2>Categorias</h2>
        <form id="categoryForm">
          <input type="hidden" id="categoryId">
          <div class="field"><label>Nome da categoria</label><input id="categoryName" required placeholder="Mais vendidos"></div>
          <button class="save-btn" type="submit">Salvar categoria</button>
        </form>
        <div id="categoriesList" class="list" style="margin-top:16px"></div>
      </section>

      <section class="panel">
        <h2 id="productFormTitle">Cadastrar produto</h2>
        <form id="productForm">
          <input type="hidden" id="productId">
          <input type="hidden" id="currentImageUrl">
          <div class="row">
            <div class="field"><label>Título</label><input id="title" required placeholder="Nome do produto"></div>
            <div class="field"><label>Categoria</label><select id="categorySelect" required></select></div>
          </div>
          <div class="field"><label>Descrição com gatilho de venda</label><textarea id="description" rows="4" required placeholder="Explique o benefício principal do produto..."></textarea></div>
          <div class="row">
            <div class="field"><label>Link de afiliado Hotmart</label><input id="affiliateUrl" type="url" required placeholder="https://go.hotmart.com/..."></div>
            <div class="field"><label>Selo opcional</label><input id="badge" placeholder="🔥 Mais vendido"></div>
          </div>
          <div class="field"><label>Imagem do produto</label><input id="imageFile" type="file" accept="image/*"><small>Ao editar, envie uma nova imagem somente se quiser substituir a atual.</small></div>
          <div class="actions"><button class="save-btn" type="submit">Salvar produto</button><button id="cancelEditBtn" class="ghost" type="button">Cancelar edição</button></div>
          <p id="productMsg"></p>
        </form>
      </section>
    </div>

    <section class="panel" style="margin-top:22px">
      <h2>Produtos cadastrados</h2>
      <div id="productsList" class="list"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/config.js"></script>
  <script src="../assets/admin.js"></script>
</body>
</html>
