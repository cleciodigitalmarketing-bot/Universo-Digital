<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Painel Admin | Vitrine Digital Pro</title><link rel="stylesheet" href="../assets/style.css"></head><body class="admin-body"><div class="admin-layout"><aside class="sidebar"><div class="logo">VD</div><h2>Painel Admin</h2><a class="active" href="#dashboard">Dashboard</a><a href="../index.html">Ver site</a><p style="color:#94a3b8;font-size:13px">Cadastre, edite e remova produtos da sua vitrine de afiliado.</p></aside><main class="main"><h1>Dashboard de Produtos</h1><div class="cards"><div class="metric"><span>Total de produtos</span><br><b id="totalProducts">0</b></div><div class="metric"><span>Categorias</span><br><b id="totalCategories">0</b></div><div class="metric"><span>Links de venda</span><br><b id="totalLinks">0</b></div></div><section class="panel"><h2 id="formTitle">Cadastrar produto</h2><form id="productForm" class="form-grid"><input type="hidden" id="productId"><div><label>Nome do produto<input id="name" required placeholder="Ex: Resina LAB"></label></div><div><label>Categoria<input id="category" required placeholder="Ex: Mais vendidos"></label></div><div class="full"><label>URL da imagem<input id="image" required placeholder="Cole o link da imagem do produto"></label></div><div class="full"><label>Link de afiliado / venda<input id="link" required placeholder="Cole aqui seu link da Hotmart"></label></div><div class="full"><label>Descrição persuasiva<textarea id="description" required placeholder="Fale o benefício do produto, para quem é indicado e o principal resultado..."></textarea></label></div><div class="full"><button class="btn primary" type="submit">Salvar produto</button><button class="btn secondary" type="button" id="cancelEdit">Cancelar edição</button></div></form></section><section class="panel"><h2>Produtos cadastrados</h2><table class="table"><thead><tr><th>Imagem</th><th>Produto</th><th>Categoria</th><th>Ações</th></tr></thead><tbody id="productRows"></tbody></table></section></main></div><script src="../assets/admin.js"></script></body></html>
